<html lang="en">
<head>
<title>Book Recommender Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f8f9fa;
    }
    #chat {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
      background-color: #fff;
        display: flex;
      flex-direction: column;
    }
    .message {
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 70%;
      word-wrap: break-word;
    }
    .bot {
      background-color: #e7f1ff;
      color: #0d6efd;
      align-self: flex-start;
    }
    .user {
      background-color: #d1e7dd;
      color: #198754;
      align-self: flex-end;
        text-align: right;
    }
    #chat-container {
      display: flex;
      flex-direction: column;
    }
    #message-input {
      width: 100%;
      border-radius: 20px;
    }

    button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
    }
    button:hover {
            background: #764ba2;
    }
    button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">📚 Book Recommender</h1>

    <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Search for a book..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
  </div>

  <!-- Bootstrap JS (optional for some components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>

      fetch('/start')
        .then(r => r.json())
        .then(data => {
            sessionId = data.session_id;
            displayMessage(data.message, 'bot');
            console.log(data.message)
        });

      function displayMessage(text, sender) {
            const box = document.getElementById('chatBox');
            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group';

            const msg = document.createElement('div');
            msg.className = `message ${sender}-message`;
            msg.textContent = text;

            messageGroup.appendChild(msg);
            box.appendChild(messageGroup);
            box.scrollTop = box.scrollHeight;
        }

        function displayRecommendations(recommendations) {
            const box = document.getElementById('chatBox');
            const container = document.createElement('div');
            container.className = 'recommendations-container';

            recommendations.forEach(rec => {
                const card = document.createElement('div');
                card.className = 'book-card';

                const title = document.createElement('div');
                title.className = 'book-title';
                title.textContent = rec.title;

                const author = document.createElement('div');
                author.className = 'book-author';
                author.textContent = `by ${rec.author}`;

                const genre = document.createElement('div');
                genre.className = 'book-genre';
                genre.textContent = rec.genres;

                const keywords = document.createElement('div');
                keywords.className = 'book-keywords';
                keywords.textContent = `Keywords: ${rec.keywords}`;

                const content = document.createElement('div');
                content.className = 'book-content';
                content.textContent = rec.content;

                card.appendChild(title);
                card.appendChild(author);
                card.appendChild(genre);
                card.appendChild(keywords);
                card.appendChild(content);

                container.appendChild(card);
            });

            box.appendChild(container);
            box.scrollTop = box.scrollHeight;
        }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      displayMessage(message, 'user');
      input.value = '';
      input.focus();

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.disabled = true;

        let waitingForContinue = false;
        if (!waitingForContinue) {
            // User search query
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                const data = await response.json();
                console.log("Response:", data);
                if (data.error) {
                    displayMessage('❌ ' + data.error, 'bot');
                } else {
                    displayMessage(data.message, 'bot');

                    // Display recommendations if available
                    if (data.recommendations && data.recommendations.length > 0) {
                        console.log("Displaying recommendations:", data.recommendations);
                        displayRecommendations(data.recommendations);
                    }

                    if (data.ask_continue) {
                        displayMessage("Would you like to search for something else?", 'bot');
                        waitingForContinue = true;
                    }
                }
            } catch (err) {
                displayMessage('❌ Error: ' + err.message, 'bot');
                console.error("Error:", err);
            }

            btn.disabled = false;
            input.disabled = false;
            input.focus();
        } else {
            try {
                const response = await fetch('/continue', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                const data = await response.json();
                displayMessage(data.message, 'bot');

                if (data.end) {
                    input.disabled = true;
                    btn.disabled = true;
                } else {
                    waitingForContinue = false;
                    btn.disabled = false;
                    input.disabled = false;
                    input.focus();
                }
            } catch (err) {
                const errorMsg = err instanceof TypeError
                    ? 'Invalid input'
                    : String(err);

                displayMessage(`❌ Error: ${errorMsg}`, 'bot');
                console.error("Error:", err);
            }

            btn.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }
  </script>
</body>
</html>
